# Committed, non-secret defaults. Overlaid by config/<profile>.toml and
# PHI_* environment variables. Secrets MUST NOT live here.

[server]
host = "0.0.0.0"
port = 8080
# tls = { cert_path = "...", key_path = "..." }   # optional; usually set per-env

[storage]
data_dir = "data/phi.db"
namespace = "phi"
database = "v0"

[telemetry]
log_filter = "info"
json_logs = true

# Session-cookie signing.
#
# `secret` is a publicly-known dev placeholder; every real deployment MUST
# override it via `PHI_SESSION__SECRET` (env var). Setting a weak or
# default secret in production means anyone can forge admin sessions.
#
# `secure = true` is correct for every environment that fronts TLS.
# `config/dev.toml` flips it to `false` so the cookie survives plaintext
# localhost HTTP.
[session]
secret = "dev-only-placeholder-override-via-env-var-32b"
cookie_name = "phi_kernel_session"
ttl_seconds = 43200
secure = true
# Platform-wide concurrency ceiling on active agent-loop sessions
# (M5 / ADR-0031). Launches beyond this cap return HTTP 503
# `SESSION_WORKER_SATURATED`. Distinct from the per-agent
# `parallelize` cap (409 `PARALLELIZE_CAP_REACHED`, which comes from
# the agent's blueprint).
max_concurrent = 16
