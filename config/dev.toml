# Developer workstation. Set PHI_PROFILE=dev (the default).

[server]
host = "127.0.0.1"
port = 8080

[storage]
data_dir = "data/phi-dev.db"

[telemetry]
log_filter = "info,phi=debug,server=debug,domain=debug,store=debug"
json_logs = false

# Plaintext localhost HTTP — let the browser keep the cookie.
[session]
secure = false
