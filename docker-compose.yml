# Local dev stack: phi-server + Next.js dev server.
# SurrealDB is embedded in phi-server (RocksDB backend), so no DB service.

services:
  server:
    build:
      context: ..
      dockerfile: phi/Dockerfile
    image: phi-server:dev
    environment:
      PHI_PROFILE: dev
      PHI_STORAGE__DATA_DIR: /var/lib/phi/data
      PHI_TELEMETRY__LOG_FILTER: "info,phi=debug"
      PHI_TELEMETRY__JSON_LOGS: "false"
    ports:
      - "8080:8080"
    volumes:
      - phi-data:/var/lib/phi/data
    restart: unless-stopped

  web:
    image: node:22-bookworm-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"
    environment:
      PHI_API_URL: http://server:8080
    ports:
      - "3000:3000"
    volumes:
      - ./modules/web:/app
      - web-node-modules:/app/node_modules
    depends_on:
      - server

volumes:
  phi-data:
  web-node-modules:
