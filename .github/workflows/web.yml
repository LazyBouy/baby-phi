name: web

on:
  push:
    branches: [main, dev]
    paths: ["baby-phi/modules/web/**", ".github/workflows/web.yml"]
  pull_request:
    branches: [main, dev]
    paths: ["baby-phi/modules/web/**", ".github/workflows/web.yml"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: baby-phi/modules/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: baby-phi/modules/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: baby-phi/modules/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm audit --production --audit-level=high
