name: Evolve

on:
  schedule:
    - cron: '0 8,20 * * *'  # 08:00 and 20:00 UTC
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      issues: read

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure git
        run: |
          git config user.name "baby-phi[bot]"
          git config user.email "baby-phi[bot]@users.noreply.github.com"

      - name: Run baby-phi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/evolve.sh

      - name: Verify bootstrap core unchanged
        run: |
          CHANGED=$(git diff HEAD~1 -- src/core/ src/main.rs 2>/dev/null | grep "^[+-]" | grep -v "^---\|^+++" | wc -l)
          if [ "$CHANGED" -gt 0 ]; then
            echo "ERROR: Bootstrap core files were modified — this should have been caught by evolve.sh"
            git diff HEAD~1 -- src/core/ src/main.rs
            exit 1
          fi
          echo "Bootstrap core unchanged ✓"

      - name: Push changes
        run: git push
