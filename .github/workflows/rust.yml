name: rust

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  fmt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: baby-phi
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt }
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: baby-phi
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - name: Install libclang (required by surrealdb-librocksdb-sys)
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: baby-phi }
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: baby-phi
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@stable
      - name: Install libclang (required by surrealdb-librocksdb-sys)
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: baby-phi }
      - run: cargo test --workspace --locked

  proptest:
    # Runs the domain-layer property tests with a deeper `PROPTEST_CASES`
    # budget than the default `test` job. Single-threaded so proptest's
    # failure reduction is deterministic across environments.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: baby-phi
    env:
      PROPTEST_CASES: "256"
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@stable
      - name: Install libclang (required by surrealdb-librocksdb-sys)
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: baby-phi }
      # `cargo test --test <name>` takes exact binary names (no glob),
      # so we run the whole domain test tree. Unit tests are <1 s
      # so the extra cost is negligible; this keeps the workflow
      # robust when new proptest files land.
      - run: cargo test -p domain -- --test-threads 1

  acceptance:
    # Full-system acceptance tests (real axum server, embedded
    # SurrealDB, real HTTP over loopback). Release-profile so any
    # optimisation-only regressions surface here before reaching prod.
    #
    # Each `--test <name>` compiles to a separate binary (and therefore
    # a separate process), so the `OnceLock` in the Prometheus layer
    # used by `acceptance_metrics` is safe alongside the other
    # binaries.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: baby-phi
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@stable
      - name: Install libclang (required by surrealdb-librocksdb-sys)
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: baby-phi }
      - run: |
          cargo test -p server --release \
            --test acceptance_bootstrap \
            --test acceptance_secrets \
            --test acceptance_model_providers \
            --test acceptance_mcp_servers \
            --test acceptance_platform_defaults \
            --test acceptance_m2 \
            --test acceptance_orgs_create \
            --test acceptance_orgs_dashboard \
            --test acceptance_m3 \
            --test acceptance_agents_list \
            --test acceptance_agents_profile \
            --test acceptance_projects_create \
            --test acceptance_projects_detail \
            --test acceptance_m4 \
            --test acceptance_metrics \
            -- --test-threads 1

  phi-core-reuse:
    # Advisory lint — grep for phi-local redeclarations of phi-core
    # types. Flipped to hard gate in M2/P3 close per plan §D16.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: baby-phi
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - run: bash scripts/check-phi-core-reuse.sh

  doc-links:
    # Walk every markdown under docs/specs/v0/implementation/ and check
    # relative links + the `Last verified: YYYY-MM-DD by …` header.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: baby-phi
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - run: bash scripts/check-doc-links.sh

  ops-doc-headers:
    # Ensure every ops runbook under docs/ops/ and */operations/
    # carries the `Last verified` header.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: baby-phi
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - run: bash scripts/check-ops-doc-headers.sh

  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: baby-phi
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  deny:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: baby-phi
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: baby-phi/Cargo.toml
